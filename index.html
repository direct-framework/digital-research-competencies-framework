<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <!--
      REDIRECTION
      ---------------------
      GitHub Pages originally hosted the website for the project
      called "RSE Competencies Toolkit", available at:

        https://rsetoolkit.github.io/rse-competencies-toolkit/

      The project was later renamed and moved to a new repository:

        https://github.com/direct-framework/digital-research-competencies-framework

      The website architecture also changed, and the live site is now hosted at:

        https://directframework.com/

      To avoid breaking old links, this gh-pages branch now contains this
      redirect page, ensuring previous URLs automatically send users to the
      new official website.
    -->

    <!-- Immediate meta refresh redirect -->
    <meta http-equiv="refresh" content="0; url=https://directframework.com/" />

    <!-- JavaScript fallback redirect -->
    <script>
      window.location.replace("https://directframework.com/");
    </script>
  </head>

  <body>
    Redirecting to directframework.com…
  </body>
</html>
